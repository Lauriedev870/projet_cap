
services:
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"  # Console Web (interface admin)
      - "9001:9001"  # API S3 (utilisée par Laravel)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --address ":9001" --console-address ":9000"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
